<div class="register-page">
  <div class="card">
    <div class="logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">Reservly</span>
    </div>

    <h2>Utwórz konto</h2>
    <p class="subtitle">Zarejestruj się za darmo</p>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Imię i nazwisko</mat-label>
        <input matInput formControlName="name" placeholder="Wpisz imię i nazwisko">
        <mat-error *ngIf="form.get('name')?.hasError('required')">Imię jest wymagane</mat-error>
        <mat-error *ngIf="form.get('name')?.hasError('minlength')">Minimum 2 znaki</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="Wpisz swój email">
        <mat-error *ngIf="form.get('email')?.hasError('required')">Email jest wymagany</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">Nieprawidłowy email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Hasło</mat-label>
        <input matInput formControlName="password" type="password" placeholder="Wpisz swoje hasło">
        <mat-error *ngIf="form.get('password')?.hasError('required')">Hasło jest wymagane</mat-error>
        <mat-error *ngIf="form.get('password')?.hasError('minlength')">Minimum 6 znaków</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Powtórz hasło</mat-label>
        <input matInput formControlName="confirmPassword" type="password" placeholder="Powtórz swoje hasło">
        <mat-error *ngIf="form.get('confirmPassword')?.hasError('required')">Powtórz hasło</mat-error>
        <mat-error *ngIf="form.hasError('passwordMismatch')">Hasła nie są zgodne</mat-error>
      </mat-form-field>

      <button mat-flat-button class="btn-submit" type="submit" [disabled]="loading">
        <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
        <span *ngIf="!loading">Zarejestruj się</span>
      </button>
    </form>

    <p class="login-link">
      Masz już konto?
      <a routerLink="/login">Zaloguj się →</a>
    </p>
  </div>
</div>
