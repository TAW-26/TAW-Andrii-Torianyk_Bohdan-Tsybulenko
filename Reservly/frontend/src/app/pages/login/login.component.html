<div class="login-page">
  <div class="card">
    <div class="logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">Reservly</span>
    </div>

    <h2>Witaj z powrotem!</h2>
    <p class="subtitle">Zaloguj się na swoje konto</p>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="Wpisz swój email">
        <mat-error *ngIf="form.get('email')?.hasError('required')">Email jest wymagany</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">Nieprawidłowy email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Hasło</mat-label>
        <input matInput formControlName="password" type="password" placeholder="Wpisz swoje hasło">
        <mat-error *ngIf="form.get('password')?.hasError('required')">Hasło jest wymagane</mat-error>
      </mat-form-field>

      <button mat-flat-button class="btn-submit" type="submit" [disabled]="loading">
        <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
        <span *ngIf="!loading">Zaloguj się</span>
      </button>
    </form>

    <div class="divider">
      <span>lub</span>
    </div>

    <p class="register-link">
      Nie masz konta?
      <a routerLink="/register">Zarejestruj się →</a>
    </p>
  </div>
</div>
